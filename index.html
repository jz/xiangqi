<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棋盘游戏</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', serif;
  background: #1a0f00;
  color: #f5e6c8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
h1 {
  font-size: 2.4rem;
  color: #d4a843;
  text-shadow: 0 0 24px rgba(212,168,67,0.5);
  margin-bottom: 8px;
  letter-spacing: 6px;
}
.subtitle {
  color: #8a6830;
  font-size: 0.9rem;
  margin-bottom: 48px;
  letter-spacing: 2px;
}
.games {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
}
.game-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 12px;
  padding: 36px 40px;
  text-align: center;
  text-decoration: none;
  color: #f5e6c8;
  transition: all 0.25s;
  min-width: 200px;
  cursor: pointer;
}
.game-card:hover {
  background: rgba(212,168,67,0.12);
  border-color: #d4a843;
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(212,168,67,0.15);
}
.game-icon {
  font-size: 3.5rem;
  margin-bottom: 16px;
  display: block;
}
.game-title {
  font-size: 1.5rem;
  color: #d4a843;
  margin-bottom: 6px;
  letter-spacing: 3px;
}
.game-subtitle {
  font-size: 0.82rem;
  color: #8a6830;
  letter-spacing: 1px;
}
footer {
  margin-top: 60px;
  font-size: 0.75rem;
  color: #4a3018;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<h1>棋盘游戏</h1>
<p class="subtitle">Board Games Collection</p>

<div class="games">
  <a href="/xiangqi/" class="game-card">
    <span class="game-icon">♟</span>
    <div class="game-title">象棋</div>
    <div class="game-subtitle">Chinese Chess</div>
  </a>
  <a href="/gomoku/" class="game-card">
    <span class="game-icon">⚫</span>
    <div class="game-title">五子棋</div>
    <div class="game-subtitle">Gomoku</div>
  </a>
</div>

<footer>Human vs AI · Two Player</footer>
</body>
</html>
