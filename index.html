<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>象棋 - Chinese Chess</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: #1a0f00;
  color: #f5e6c8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  font-size: 2rem;
  color: #d4a843;
  text-shadow: 0 0 20px rgba(212,168,67,0.5);
  margin-bottom: 16px;
  letter-spacing: 4px;
}

#app {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 1100px;
}

/* ── Board ── */
#board-container {
  position: relative;
  user-select: none;
}

#board {
  background: #c8a869;
  border: 3px solid #7a5c2a;
  box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.2);
  cursor: pointer;
}

/* ── Side Panel ── */
#panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 240px;
  max-width: 280px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 8px;
  padding: 14px;
}

.card h3 {
  color: #d4a843;
  font-size: 0.85rem;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* Status */
#status-text {
  font-size: 1.1rem;
  font-weight: bold;
  text-align: center;
  padding: 8px;
  border-radius: 4px;
  transition: all 0.3s;
}

#status-text.red { color: #e84040; background: rgba(232,64,64,0.1); }
#status-text.black { color: #888; background: rgba(100,100,100,0.1); }
#status-text.check { animation: pulse 0.8s infinite; }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  padding: 8px 14px;
  border: 1px solid rgba(212,168,67,0.4);
  background: rgba(212,168,67,0.15);
  color: #d4a843;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.2s;
  letter-spacing: 1px;
}

button:hover { background: rgba(212,168,67,0.3); border-color: #d4a843; }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.4; cursor: default; }

button.danger { border-color: rgba(232,64,64,0.4); color: #e84040; background: rgba(232,64,64,0.1); }
button.danger:hover { background: rgba(232,64,64,0.25); }

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Move History */
#move-list {
  max-height: 200px;
  overflow-y: auto;
  font-size: 0.78rem;
  line-height: 1.7;
}

#move-list::-webkit-scrollbar { width: 4px; }
#move-list::-webkit-scrollbar-track { background: transparent; }
#move-list::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.4); border-radius: 2px; }

.move-entry { display: flex; gap: 8px; }
.move-num { color: rgba(212,168,67,0.5); min-width: 24px; }
.move-red { color: #e84040; }
.move-black { color: #aaa; }

/* FEN input */
#fen-input {
  width: 100%;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,168,67,0.3);
  color: #f5e6c8;
  border-radius: 4px;
  font-size: 0.75rem;
  font-family: monospace;
  resize: vertical;
  min-height: 60px;
}

#fen-input:focus { outline: none; border-color: #d4a843; }

#fen-output {
  width: 100%;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,168,67,0.2);
  color: #aaa;
  border-radius: 4px;
  font-size: 0.72rem;
  font-family: monospace;
  word-break: break-all;
  cursor: text;
}

/* File upload */
#file-input { display: none; }
label.btn-like {
  display: inline-block;
  padding: 8px 14px;
  border: 1px solid rgba(212,168,67,0.4);
  background: rgba(212,168,67,0.15);
  color: #d4a843;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.2s;
  letter-spacing: 1px;
}
label.btn-like:hover { background: rgba(212,168,67,0.3); border-color: #d4a843; }

/* Toast */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(30,20,5,0.95);
  border: 1px solid #d4a843;
  color: #d4a843;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 0.9rem;
  transition: transform 0.3s;
  z-index: 999;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Captured pieces */
#captured-black, #captured-red {
  font-size: 0.9rem;
  min-height: 24px;
  letter-spacing: 2px;
  line-height: 1.6;
  word-break: break-all;
}
#captured-black { color: #888; }
#captured-red { color: #e84040; }

/* AI Mode UI */
.mode-btns { display:flex; gap:6px; flex-wrap:wrap; }
.mode-btn {
  flex:1; padding:7px 8px;
  border:1px solid rgba(212,168,67,0.4);
  background:rgba(212,168,67,0.1);
  color:#d4a843; border-radius:4px; cursor:pointer;
  font-size:0.8rem; transition:all 0.2s; text-align:center;
  letter-spacing:0.5px;
}
.mode-btn:hover { background:rgba(212,168,67,0.25); }
.mode-btn.active { background:rgba(212,168,67,0.35); border-color:#d4a843; font-weight:bold; }
#ai-sub-options { margin-top:10px; }
#ai-sub-options .sub-label { font-size:0.75rem; color:#aaa; margin-bottom:5px; margin-top:8px; }
#ai-thinking {
  display:none; color:#aaa; font-size:0.82rem;
  text-align:center; padding:4px; margin-top:6px;
}
#ai-thinking.visible { display:block; animation:pulse 1s infinite; }
</style>
</head>
<body>
<h1>象 棋</h1>
<div id="app">
  <div id="board-container">
    <canvas id="board" width="521" height="577"></canvas>
  </div>
  <div id="panel">
    <!-- Status -->
    <div class="card">
      <h3>对局状态</h3>
      <div id="status-text" class="red">红方先行</div>
      <div id="ai-thinking">AI思考中...</div>
    </div>

    <!-- Game mode -->
    <div class="card">
      <h3>对局模式</h3>
      <div class="mode-btns">
        <button class="mode-btn active" id="btn-mode-pvp">双人对弈</button>
        <button class="mode-btn" id="btn-mode-ai">人机对弈</button>
      </div>
      <div id="ai-sub-options" style="display:none">
        <div class="sub-label">执子颜色</div>
        <div class="mode-btns">
          <button class="mode-btn active" id="btn-color-red">红方</button>
          <button class="mode-btn" id="btn-color-black">黑方</button>
        </div>
        <div class="sub-label">难度</div>
        <div class="mode-btns">
          <button class="mode-btn" id="btn-diff-easy">简单</button>
          <button class="mode-btn active" id="btn-diff-medium">中等</button>
          <button class="mode-btn" id="btn-diff-hard">困难</button>
        </div>
        <div class="sub-label">AI引擎</div>
        <div class="mode-btns">
          <button class="mode-btn active" id="btn-engine-local">本地AI</button>
          <button class="mode-btn" id="btn-engine-pikafish">Pikafish</button>
        </div>
      </div>
    </div>

    <!-- position -->
    <div class="card">
      <h3>局面导入</h3>
      <textarea id="fen-input" placeholder="粘贴 FEN 或 JSON 局面字符串..."></textarea>
      <div class="btn-row" style="margin-top:8px">
        <button id="btn-load-fen">加载</button>
        <label class="btn-like" for="file-input">上传文件</label>
        <input type="file" id="file-input" accept=".json,.fen,.txt">
      </div>
    </div>

    <!-- controls -->
    <div class="card">
      <h3>操作</h3>
      <div class="btn-row">
        <button id="btn-new" class="danger">新局</button>
        <button id="btn-undo" disabled>悔棋</button>
        <button id="btn-redo" disabled>重做</button>
      </div>
    </div>

    <!-- Captured -->
    <div class="card">
      <h3>已吃子</h3>
      <div id="captured-black"></div>
      <div style="height:4px"></div>
      <div id="captured-red"></div>
    </div>

    <!-- move history -->
    <div class="card">
      <h3>走子记录</h3>
      <div id="move-list"></div>
    </div>

    <!-- export -->
    <div class="card">
      <h3>导出局面</h3>
      <div id="fen-output"></div>
      <div class="btn-row" style="margin-top:8px">
        <button id="btn-copy-fen">复制 FEN</button>
        <button id="btn-save">存档</button>
        <button id="btn-load-save">读档</button>
        <button id="btn-clear-save" title="清除自动存档">清除</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
