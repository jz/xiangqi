<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>象棋 - Chinese Chess</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: #1a0f00;
  color: #f5e6c8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  font-size: 2rem;
  color: #d4a843;
  text-shadow: 0 0 20px rgba(212,168,67,0.5);
  margin-bottom: 16px;
  letter-spacing: 4px;
}

#app {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 1100px;
}

/* ── Board ── */
#board-container {
  position: relative;
  user-select: none;
}

#board {
  background: #c8a869;
  border: 3px solid #7a5c2a;
  box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.2);
  cursor: pointer;
}

/* ── Side Panel ── */
#panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 240px;
  max-width: 280px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 8px;
  padding: 14px;
}

.card h3 {
  color: #d4a843;
  font-size: 0.85rem;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* Status */
#status-text {
  font-size: 1.1rem;
  font-weight: bold;
  text-align: center;
  padding: 8px;
  border-radius: 4px;
  transition: all 0.3s;
}

#status-text.red { color: #e84040; background: rgba(232,64,64,0.1); }
#status-text.black { color: #888; background: rgba(100,100,100,0.1); }
#status-text.check { animation: pulse 0.8s infinite; }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  padding: 8px 14px;
  border: 1px solid rgba(212,168,67,0.4);
  background: rgba(212,168,67,0.15);
  color: #d4a843;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.2s;
  letter-spacing: 1px;
}

button:hover { background: rgba(212,168,67,0.3); border-color: #d4a843; }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.4; cursor: default; }

button.danger { border-color: rgba(232,64,64,0.4); color: #e84040; background: rgba(232,64,64,0.1); }
button.danger:hover { background: rgba(232,64,64,0.25); }

/* Move History */
#move-list {
  max-height: 200px;
  overflow-y: auto;
  font-size: 0.78rem;
  line-height: 1.7;
}

#move-list::-webkit-scrollbar { width: 4px; }
#move-list::-webkit-scrollbar-track { background: transparent; }
#move-list::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.4); border-radius: 2px; }

.move-entry { display: flex; gap: 8px; }
.move-num { color: rgba(212,168,67,0.5); min-width: 24px; }
.move-red { color: #e84040; }
.move-black { color: #aaa; }

/* FEN input */
#fen-input {
  width: 100%;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,168,67,0.3);
  color: #f5e6c8;
  border-radius: 4px;
  font-size: 0.75rem;
  font-family: monospace;
  resize: vertical;
  min-height: 60px;
}

#fen-input:focus { outline: none; border-color: #d4a843; }

#fen-output {
  width: 100%;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(212,168,67,0.2);
  color: #aaa;
  border-radius: 4px;
  font-size: 0.72rem;
  font-family: monospace;
  word-break: break-all;
  cursor: text;
}

/* File upload */
#file-input { display: none; }
label.btn-like {
  display: inline-block;
  padding: 8px 14px;
  border: 1px solid rgba(212,168,67,0.4);
  background: rgba(212,168,67,0.15);
  color: #d4a843;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.2s;
  letter-spacing: 1px;
}
label.btn-like:hover { background: rgba(212,168,67,0.3); border-color: #d4a843; }

/* Toast */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(30,20,5,0.95);
  border: 1px solid #d4a843;
  color: #d4a843;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 0.9rem;
  transition: transform 0.3s;
  z-index: 999;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Captured pieces */
#captured-black, #captured-red {
  font-size: 0.9rem;
  min-height: 24px;
  letter-spacing: 2px;
  line-height: 1.6;
  word-break: break-all;
}
#captured-black { color: #888; }
#captured-red { color: #e84040; }

/* AI Mode UI */
.mode-btns { display:flex; gap:6px; flex-wrap:wrap; }
.mode-btn {
  flex:1; padding:7px 8px;
  border:1px solid rgba(212,168,67,0.4);
  background:rgba(212,168,67,0.1);
  color:#d4a843; border-radius:4px; cursor:pointer;
  font-size:0.8rem; transition:all 0.2s; text-align:center;
  letter-spacing:0.5px;
}
.mode-btn:hover { background:rgba(212,168,67,0.25); }
.mode-btn.active { background:rgba(212,168,67,0.35); border-color:#d4a843; font-weight:bold; }
#ai-sub-options { margin-top:10px; }
#ai-sub-options .sub-label { font-size:0.75rem; color:#aaa; margin-bottom:5px; margin-top:8px; }
#ai-thinking {
  display:none; color:#aaa; font-size:0.82rem;
  text-align:center; padding:4px; margin-top:6px;
}
#ai-thinking.visible { display:block; animation:pulse 1s infinite; }
</style>
</head>
<body>
<h1>象 棋</h1>
<div id="app">
  <div id="board-container">
    <canvas id="board" width="521" height="577"></canvas>
  </div>
  <div id="panel">
    <!-- Status -->
    <div class="card">
      <h3>对局状态</h3>
      <div id="status-text" class="red">红方先行</div>
      <div id="ai-thinking">AI思考中...</div>
    </div>

    <!-- Game Mode -->
    <div class="card">
      <h3>对局模式</h3>
      <div class="mode-btns">
        <button class="mode-btn active" id="btn-mode-pvp">双人对弈</button>
        <button class="mode-btn" id="btn-mode-ai">人机对弈</button>
      </div>
      <div id="ai-sub-options" style="display:none">
        <div class="sub-label">执子颜色</div>
        <div class="mode-btns">
          <button class="mode-btn active" id="btn-color-red">红方</button>
          <button class="mode-btn" id="btn-color-black">黑方</button>
        </div>
        <div class="sub-label">难度</div>
        <div class="mode-btns">
          <button class="mode-btn" id="btn-diff-easy">简单</button>
          <button class="mode-btn active" id="btn-diff-medium">中等</button>
          <button class="mode-btn" id="btn-diff-hard">困难</button>
        </div>
        <div class="sub-label">AI引擎</div>
        <div class="mode-btns">
          <button class="mode-btn active" id="btn-engine-local">本地AI</button>
          <button class="mode-btn" id="btn-engine-pikafish">Pikafish</button>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="card">
      <h3>操作</h3>
      <div class="btn-row">
        <button id="btn-new" class="danger">新局</button>
        <button id="btn-undo" disabled>悔棋</button>
        <button id="btn-redo" disabled>重做</button>
      </div>
    </div>

    <!-- Captured -->
    <div class="card">
      <h3>已吃子</h3>
      <div id="captured-black"></div>
      <div style="height:4px"></div>
      <div id="captured-red"></div>
    </div>

    <!-- Move History -->
    <div class="card">
      <h3>走子记录</h3>
      <div id="move-list"></div>
    </div>

    <!-- Position -->
    <div class="card">
      <h3>局面导入</h3>
      <textarea id="fen-input" placeholder="粘贴 FEN 或 JSON 局面字符串..."></textarea>
      <div class="btn-row" style="margin-top:8px">
        <button id="btn-load-fen">加载</button>
        <label class="btn-like" for="file-input">上传文件</label>
        <input type="file" id="file-input" accept=".json,.fen,.txt">
      </div>
    </div>

    <!-- Export -->
    <div class="card">
      <h3>导出局面</h3>
      <div id="fen-output"></div>
      <div class="btn-row" style="margin-top:8px">
        <button id="btn-copy-fen">复制 FEN</button>
        <button id="btn-save">存档</button>
        <button id="btn-load-save">读档</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const COLS = 9, ROWS = 10;
const CELL = 57; // pixels per cell
const PAD  = 36; // board padding
const W = PAD*2 + CELL*(COLS-1);  // 521
const H = PAD*2 + CELL*(ROWS-1); // 577

// Piece codes: uppercase = Red, lowercase = Black
// K/k=General, A/a=Advisor, B/b=Elephant(Bishop), R/r=Chariot, N/n=Horse, C/c=Cannon, P/p=Pawn
const RED   = 'red';
const BLACK = 'black';

const PIECE_CHARS = {
  K:'帥', A:'仕', B:'相', R:'車', N:'馬', C:'炮', P:'兵',
  k:'將', a:'士', b:'象', r:'俥', n:'傌', c:'砲', p:'卒'
};

// Standard start FEN (rank 0 = black side top, rank 9 = red side bottom)
const START_FEN = 'rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR r';

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
let board       = [];   // board[row][col] = piece char or ''
let turn        = RED;
let selected    = null; // {row,col} or null
let legalMoves  = [];   // [{row,col}]
let history     = [];   // array of {board,turn,captured,moveStr}
let future      = [];
let capturedRed = [];   // pieces red has captured (black pieces)
let capturedBlack = []; // pieces black has captured (red pieces)

// ─── AI STATE ────────────────────────────────────────────────
let gameMode    = 'pvp'; // 'pvp' | 'ai'
let playerColor = RED;   // color the human plays in AI mode
let difficulty  = 2;     // search depth: 1=easy, 2=medium, 3=hard
let aiThinking  = false;
let aiMoveToken = 0;     // increment to cancel pending AI move
let aiEngine    = 'local'; // 'local' | 'pikafish'

const PIKAFISH_API = 'https://nice-states-shop.loca.lt';

// ═══════════════════════════════════════════════════════════
// FEN PARSING
// ═══════════════════════════════════════════════════════════
function parseFEN(fen) {
  fen = fen.trim();
  const parts = fen.split(/\s+/);
  const rows = parts[0].split('/');
  if (rows.length !== 10) throw new Error('FEN must have 10 ranks');
  const b = [];
  for (let r = 0; r < 10; r++) {
    b[r] = [];
    let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '9') {
        for (let i = 0; i < +ch; i++) b[r][c++] = '';
      } else {
        b[r][c++] = ch;
      }
    }
    while (b[r].length < 9) b[r].push('');
  }
  const t = (parts[1] === 'b') ? BLACK : RED;
  return { board: b, turn: t };
}

function boardToFEN(b, t) {
  const rows = [];
  for (let r = 0; r < 10; r++) {
    let s = '', empty = 0;
    for (let c = 0; c < 9; c++) {
      if (b[r][c]) { if (empty) { s += empty; empty = 0; } s += b[r][c]; }
      else empty++;
    }
    if (empty) s += empty;
    rows.push(s);
  }
  return rows.join('/') + ' ' + (t === BLACK ? 'b' : 'r');
}

// ═══════════════════════════════════════════════════════════
// PIECE HELPERS
// ═══════════════════════════════════════════════════════════
function pieceColor(p) {
  if (!p) return null;
  return p === p.toUpperCase() ? RED : BLACK;
}

function isRed(p)   { return p && p === p.toUpperCase(); }
function isBlack(p) { return p && p === p.toLowerCase(); }
function enemy(color) { return color === RED ? BLACK : RED; }

function inBounds(r,c) { return r>=0 && r<10 && c>=0 && c<9; }
function inPalace(r,c,color) {
  if (color === RED)   return r>=7 && r<=9 && c>=3 && c<=5;
  if (color === BLACK) return r>=0 && r<=2 && c>=3 && c<=5;
}

// ═══════════════════════════════════════════════════════════
// MOVE GENERATION (raw, without check filtering)
// ═══════════════════════════════════════════════════════════
function rawMoves(b, r, c) {
  const p = b[r][c];
  if (!p) return [];
  const color = pieceColor(p);
  const type  = p.toUpperCase();
  const moves = [];

  const add = (nr, nc) => {
    if (!inBounds(nr,nc)) return;
    if (pieceColor(b[nr][nc]) === color) return;
    moves.push({row:nr, col:nc});
  };

  switch(type) {
    case 'K': { // General — palace only, orthogonal 1 step
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc) && inPalace(nr,nc,color)) add(nr,nc);
      });
      // Flying general: if generals face each other with no pieces between
      // (handled as a pseudo-move blocker in legalMoves)
      break;
    }
    case 'A': { // Advisor — diagonal 1 step inside palace
      [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dr,dc])=>{
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc) && inPalace(nr,nc,color)) add(nr,nc);
      });
      break;
    }
    case 'B': { // Elephant — diagonal 2, no river cross, check for block
      const riverRow = color===RED ? 4 : 5;
      [[2,2],[2,-2],[-2,2],[-2,-2]].forEach(([dr,dc])=>{
        const nr=r+dr, nc=c+dc;
        if (!inBounds(nr,nc)) return;
        // No river crossing
        if (color===RED && nr<5) return;
        if (color===BLACK && nr>4) return;
        // Elephant leg block check
        if (b[r+dr/2][c+dc/2]) return;
        add(nr,nc);
      });
      break;
    }
    case 'N': { // Horse — L-shape with blocking
      [[1,0],[- 1,0],[0,1],[0,-1]].forEach(([lr,lc])=>{
        const mr=r+lr, mc=c+lc;
        if (!inBounds(mr,mc)) return;
        if (b[mr][mc]) return; // leg blocked
        [[lr+lc, lc+lr],[lr-lc, lc-lr]].forEach(([dr,dc])=>{
          // Horse moves: first step orthogonal, second step diagonal away
          // Correct offsets:
        });
        // Recalculate properly:
      });
      // Redo horse moves properly
      moves.length = 0;
      const horseDirs = [
        [-1,0, [[-2,-1],[-2,1]]],
        [1,0,  [[2,-1],[2,1]]],
        [0,-1, [[-1,-2],[1,-2]]],
        [0,1,  [[-1,2],[1,2]]]
      ];
      for (const [lr,lc,steps] of horseDirs) {
        const mr=r+lr, mc=c+lc;
        if (!inBounds(mr,mc) || b[mr][mc]) continue;
        for (const [dr,dc] of steps) {
          const nr=r+dr, nc=c+dc;
          if (!inBounds(nr,nc)) continue;
          if (pieceColor(b[nr][nc]) === color) continue;
          moves.push({row:nr,col:nc});
        }
      }
      break;
    }
    case 'R': { // Chariot — straight lines unlimited
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          if (b[nr][nc]) { add(nr,nc); break; }
          moves.push({row:nr,col:nc});
          nr+=dr; nc+=dc;
        }
      });
      break;
    }
    case 'C': { // Cannon — moves like chariot, captures by jumping exactly 1 piece
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
        let nr=r+dr, nc=c+dc;
        let jumped = false;
        while (inBounds(nr,nc)) {
          if (!jumped) {
            if (b[nr][nc]) jumped = true;
            else moves.push({row:nr,col:nc});
          } else {
            if (b[nr][nc]) {
              if (pieceColor(b[nr][nc]) !== color) moves.push({row:nr,col:nc});
              break;
            }
          }
          nr+=dr; nc+=dc;
        }
      });
      break;
    }
    case 'P': { // Pawn
      if (color === RED) {
        // Red pawns move up (decreasing row)
        add(r-1, c);
        if (r <= 4) { add(r, c-1); add(r, c+1); } // crossed river
      } else {
        // Black pawns move down (increasing row)
        add(r+1, c);
        if (r >= 5) { add(r, c-1); add(r, c+1); } // crossed river
      }
      break;
    }
  }
  return moves;
}

// ═══════════════════════════════════════════════════════════
// CHECK DETECTION
// ═══════════════════════════════════════════════════════════
function findKing(b, color) {
  const k = color === RED ? 'K' : 'k';
  for (let r=0;r<10;r++) for (let c=0;c<9;c++) if (b[r][c]===k) return {row:r,col:c};
  return null;
}

function isInCheck(b, color) {
  const king = findKing(b, color);
  if (!king) return false;
  // Check if any enemy piece attacks the king
  const opp = enemy(color);
  for (let r=0;r<10;r++) {
    for (let c=0;c<9;c++) {
      if (pieceColor(b[r][c]) !== opp) continue;
      const moves = rawMoves(b,r,c);
      if (moves.some(m=>m.row===king.row && m.col===king.col)) return true;
    }
  }
  // Flying general rule
  return flyingGeneral(b, color, king);
}

function flyingGeneral(b, color, king) {
  // Check if the two generals face each other with no pieces between
  const oppK = color===RED ? 'k' : 'K';
  const oppKing = findKing(b, enemy(color));
  if (!oppKing) return false;
  if (oppKing.col !== king.col) return false;
  const minR = Math.min(king.row, oppKing.row);
  const maxR = Math.max(king.row, oppKing.row);
  for (let r=minR+1;r<maxR;r++) if (b[r][king.col]) return false;
  return true;
}

function applyMove(b, from, to) {
  const nb = b.map(row=>[...row]);
  nb[to.row][to.col] = nb[from.row][from.col];
  nb[from.row][from.col] = '';
  return nb;
}

function legalMovesFor(b, r, c) {
  const color = pieceColor(b[r][c]);
  if (!color) return [];
  return rawMoves(b,r,c).filter(m=>{
    const nb = applyMove(b, {row:r,col:c}, m);
    return !isInCheck(nb, color);
  });
}

function hasLegalMoves(b, color) {
  for (let r=0;r<10;r++)
    for (let c=0;c<9;c++)
      if (pieceColor(b[r][c])===color && legalMovesFor(b,r,c).length>0)
        return true;
  return false;
}

// ═══════════════════════════════════════════════════════════
// MOVE NOTATION
// ═══════════════════════════════════════════════════════════
function moveNotation(b, from, to) {
  const p = b[from.row][from.col];
  const char = PIECE_CHARS[p] || p;
  const cols = ['一','二','三','四','五','六','七','八','九'];
  // Red: columns 1-9 from right; Black: columns 1-9 from left
  const fc = isRed(p) ? (8-from.col) : from.col;
  const tc = isRed(p) ? (8-to.col)   : to.col;
  const dr = to.row - from.row;
  let dir = '';
  if (dr === 0) dir = '平';
  else if (isRed(p)) dir = dr < 0 ? '进' : '退';
  else dir = dr > 0 ? '进' : '退';
  const dest = dr === 0 ? cols[tc] : String(Math.abs(dr));
  return `${char}${cols[fc]}${dir}${dest}`;
}

// ═══════════════════════════════════════════════════════════
// GAME ACTIONS
// ═══════════════════════════════════════════════════════════
function newGame() {
  cancelAI();
  const parsed = parseFEN(START_FEN);
  board = parsed.board;
  turn  = parsed.turn;
  selected = null;
  legalMoves = [];
  history = [];
  future  = [];
  capturedRed   = [];
  capturedBlack = [];
  document.getElementById('move-list').innerHTML = '';
  render();
  updateUI();
}

function selectCell(r, c) {
  // Block human input when AI is thinking or when it is AI's turn
  if (gameMode === 'ai' && (aiThinking || turn !== playerColor)) return;

  const p = board[r][c];
  const pColor = pieceColor(p);

  if (selected) {
    const move = legalMoves.find(m=>m.row===r&&m.col===c);
    if (move) {
      doMove(selected, move);
      return;
    }
    if (pColor === turn) {
      selected = {row:r,col:c};
      legalMoves = legalMovesFor(board, r, c);
      render(); return;
    }
    selected = null; legalMoves = [];
    render(); return;
  }

  if (pColor === turn) {
    selected = {row:r,col:c};
    legalMoves = legalMovesFor(board, r, c);
    render();
  }
}

function doMove(from, to) {
  const notation = moveNotation(board, from, to);
  const captured = board[to.row][to.col];

  // Save state
  history.push({
    board: board.map(r=>[...r]),
    turn, capturedRed:[...capturedRed], capturedBlack:[...capturedBlack],
    notation, from, to, captured
  });
  future = [];

  if (captured) {
    if (isRed(captured)) capturedBlack.push(captured);
    else capturedRed.push(captured);
  }

  board = applyMove(board, from, to);
  turn = enemy(turn);
  selected = null; legalMoves = [];

  render();
  updateUI();
  addMoveToHistory(notation, enemy(turn));

  // Check game over
  const inChk = isInCheck(board, turn);
  const noMoves = !hasLegalMoves(board, turn);
  if (noMoves) {
    const winner = enemy(turn) === RED ? '红方' : '黑方';
    setTimeout(()=>toast(`${winner}胜！${inChk?'将军！':'困毙！'}`, 4000),200);
  } else if (inChk) {
    toast('将军！');
    // Schedule AI move if needed (even after check announcement)
    if (gameMode === 'ai' && turn !== playerColor) scheduleAIMove();
  } else {
    // Schedule AI move if it's now AI's turn
    if (gameMode === 'ai' && turn !== playerColor) scheduleAIMove();
  }
}

function undoOnce() {
  if (!history.length) return false;
  const state = history.pop();
  future.push({board:board.map(r=>[...r]),turn,capturedRed:[...capturedRed],capturedBlack:[...capturedBlack],
    notation:state.notation||''});
  board = state.board; turn = state.turn;
  capturedRed = state.capturedRed; capturedBlack = state.capturedBlack;
  selected = null; legalMoves = [];
  return true;
}

function undo() {
  // Cancel any pending AI move
  if (aiThinking) {
    aiMoveToken++;
    aiThinking = false;
    showAIThinking(false);
    // If AI was thinking, player just moved — undo that player move
    undoOnce();
    rebuildMoveList(); render(); updateUI();
    return;
  }
  if (!history.length) return;
  // In AI mode, undo 2 moves (AI + player) so player can retry
  const undoCount = (gameMode === 'ai' && history.length >= 2) ? 2 : 1;
  for (let i = 0; i < undoCount; i++) undoOnce();
  rebuildMoveList(); render(); updateUI();
}

function redo() {
  if (!future.length) return;
  const state = future.pop();
  history.push({board:board.map(r=>[...r]),turn,capturedRed:[...capturedRed],capturedBlack:[...capturedBlack],
    notation:state.notation||'', from:null, to:null});
  board = state.board; turn = state.turn;
  capturedRed = state.capturedRed; capturedBlack = state.capturedBlack;
  selected = null; legalMoves = [];
  rebuildMoveList();
  render(); updateUI();
}

const WORKER_SRC = `
'use strict';
const RED='red',BLACK='black';
const PVAL={K:10000,A:120,B:150,N:410,R:900,C:450,P:70};
const VICTIM_VAL={P:10,N:41,B:15,A:15,C:45,R:90,K:1000};
const ATTACKER_ORDER={P:1,N:2,B:2,A:2,C:3,R:4,K:5};

function pc(p){if(!p)return null;return p===p.toUpperCase()?RED:BLACK;}
function isR(p){return p&&p===p.toUpperCase();}
function en(c){return c===RED?BLACK:RED;}
function inB(r,c){return r>=0&&r<10&&c>=0&&c<9;}
function inP(r,c,color){
  if(color===RED)return r>=7&&r<=9&&c>=3&&c<=5;
  return r>=0&&r<=2&&c>=3&&c<=5;
}
function applyMove(b,from,to){
  const nb=b.map(r=>[...r]);
  nb[to.row][to.col]=nb[from.row][from.col];
  nb[from.row][from.col]='';
  return nb;
}
function rawMoves(b,r,c){
  const p=b[r][c];if(!p)return[];
  const color=pc(p),type=p.toUpperCase(),moves=[];
  const add=(nr,nc)=>{if(!inB(nr,nc))return;if(pc(b[nr][nc])===color)return;moves.push({row:nr,col:nc});};
  switch(type){
    case 'K':
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&inP(nr,nc,color))add(nr,nc);});
      break;
    case 'A':
      [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&inP(nr,nc,color))add(nr,nc);});
      break;
    case 'B':
      [[2,2],[2,-2],[-2,2],[-2,-2]].forEach(([dr,dc])=>{
        const nr=r+dr,nc=c+dc;
        if(!inB(nr,nc))return;
        if(color===RED&&nr<5)return;
        if(color===BLACK&&nr>4)return;
        if(b[r+dr/2][c+dc/2])return;
        add(nr,nc);
      });
      break;
    case 'N':{
      const dirs=[[-1,0,[[-2,-1],[-2,1]]],[1,0,[[2,-1],[2,1]]],[0,-1,[[-1,-2],[1,-2]]],[0,1,[[-1,2],[1,2]]]];
      for(const[lr,lc,steps]of dirs){const mr=r+lr,mc=c+lc;if(!inB(mr,mc)||b[mr][mc])continue;for(const[dr,dc]of steps){const nr=r+dr,nc=c+dc;if(!inB(nr,nc))continue;if(pc(b[nr][nc])===color)continue;moves.push({row:nr,col:nc});}}
      break;
    }
    case 'R':
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(b[nr][nc]){add(nr,nc);break;}moves.push({row:nr,col:nc});nr+=dr;nc+=dc;}});
      break;
    case 'C':
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{let nr=r+dr,nc=c+dc,jumped=false;while(inB(nr,nc)){if(!jumped){if(b[nr][nc])jumped=true;else moves.push({row:nr,col:nc});}else{if(b[nr][nc]){if(pc(b[nr][nc])!==color)moves.push({row:nr,col:nc});break;}}nr+=dr;nc+=dc;}});
      break;
    case 'P':
      if(color===RED){add(r-1,c);if(r<=4){add(r,c-1);add(r,c+1);}}
      else{add(r+1,c);if(r>=5){add(r,c-1);add(r,c+1);}}
      break;
  }
  return moves;
}
function findKing(b,color){const k=color===RED?'K':'k';for(let r=0;r<10;r++)for(let c=0;c<9;c++)if(b[r][c]===k)return{row:r,col:c};return null;}
function flyingGeneral(b,color,king){
  const oppKing=findKing(b,en(color));
  if(!oppKing||oppKing.col!==king.col)return false;
  const minR=Math.min(king.row,oppKing.row),maxR=Math.max(king.row,oppKing.row);
  for(let r=minR+1;r<maxR;r++)if(b[r][king.col])return false;
  return true;
}
function isInCheck(b,color){
  const king=findKing(b,color);if(!king)return false;
  const opp=en(color);
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){if(pc(b[r][c])!==opp)continue;if(rawMoves(b,r,c).some(m=>m.row===king.row&&m.col===king.col))return true;}
  return flyingGeneral(b,color,king);
}
function legalMovesFor(b,r,c){
  const color=pc(b[r][c]);if(!color)return[];
  return rawMoves(b,r,c).filter(m=>{const nb=applyMove(b,{row:r,col:c},m);return !isInCheck(nb,color);});
}
function countMobility(b,color){
  let n=0;
  for(let r=0;r<10;r++)for(let c=0;c<9;c++)if(pc(b[r][c])===color)n+=legalMovesFor(b,r,c).length;
  return n;
}

// Enhanced piece-square tables (row 0=black home, row 9=red home, from Red perspective)

  N:[[4,8,16,12,4,12,16,8,4],[4,10,28,16,8,16,28,10,4],[12,14,16,20,18,20,16,14,12],[8,26,30,26,28,26,30,26,8],[6,22,26,26,28,26,26,22,6],[4,12,18,22,24,22,18,12,4],[4,6,16,14,12,14,16,6,4],[0,4,10,10,2,10,10,4,0],[0,2,4,4,-2,4,4,2,0],[0,-4,0,0,0,0,0,-4,0]],
  R:[[14,14,12,18,16,18,12,14,14],[16,20,18,24,26,24,18,20,16],[12,12,12,18,18,18,12,12,12],[12,18,16,22,22,22,16,18,12],[12,14,12,18,18,18,12,14,12],[12,16,14,20,20,20,14,16,12],[6,6,6,14,14,14,6,6,6],[6,10,8,14,14,14,8,10,6],[8,10,10,12,12,12,10,10,8],[6,10,8,14,0,14,8,10,6]],
  C:[[6,4,0,14,0,14,0,4,6],[8,6,4,16,6,16,4,6,8],[6,0,2,10,6,10,2,0,6],[4,0,0,6,10,6,0,0,4],[2,0,4,0,12,0,4,0,2],[2,2,2,0,14,0,2,2,2],[0,0,2,2,14,2,2,0,0],[4,0,0,2,14,2,0,0,4],[8,6,4,6,16,6,4,6,8],[0,0,2,6,0,6,2,0,0]],
  P:[[0,3,6,9,12,9,6,3,0],[18,36,56,80,120,80,56,36,18],[14,26,42,60,80,60,42,26,14],[10,20,30,34,40,34,30,20,10],[2,4,8,14,16,14,8,4,2],[0,0,0,0,0,0,0,0,0],[2,0,8,0,8,0,8,0,2],[0,0,0,0,8,0,0,0,0],[0,0,0,0,10,0,0,0,0],[0,0,0,2,10,2,0,0,0]],

function posScore(p,r,c){
  const type=p.toUpperCase(),tbl=PST[type];if(!tbl)return 0;
  const row=isR(p)?r:(9-r);
  return tbl[row][c];
}

function evaluate(b){
  let score=0;
  let redPieces=0,blackPieces=0;
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){
    const p=b[r][c];if(!p)continue;
    const val=PVAL[p.toUpperCase()]+posScore(p,r,c);
    if(isR(p)){score+=val;redPieces++;}else{score-=val;blackPieces++;}
  }
  // King safety: penalty if in check
  if(isInCheck(b,RED))score-=90;
  if(isInCheck(b,BLACK))score+=90;
  // Center control bonus (cols 3-5, rows 4-5)
  for(let r=4;r<=5;r++)for(let c=3;c<=5;c++){
    const p=b[r][c];if(!p)continue;
    if(isR(p))score+=8;else score-=8;
  }
  // Mobility (only compute in quieter positions to save time)
  if(redPieces+blackPieces<28){
    score+=countMobility(b,RED)*2;
    score-=countMobility(b,BLACK)*2;
  }
  return score;
}

// Zobrist hashing
const PIECES='KkAaBbRrNnCcPp';
const ZT=[];
for(let r=0;r<10;r++){ZT[r]=[];for(let c=0;c<9;c++){ZT[r][c]={};for(const p of PIECES)ZT[r][c][p]=(Math.random()*0x7FFFFFFF|0)+1;}}
const ZBLACK=(Math.random()*0x7FFFFFFF|0)+1;
function zobrist(b,color){
  let h=color===BLACK?ZBLACK:0;
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){const p=b[r][c];if(p)h^=ZT[r][c][p];}
  return h;
}

// Transposition table
const TT=new Map();
const EXACT=0,LOWER=1,UPPER=2;

// Killer moves per depth
const killers=Array.from({length:24},()=>[null,null]);

function mvvLva(b,move){
  const victim=b[move.to.row][move.to.col];
  if(victim){
    const vv=VICTIM_VAL[victim.toUpperCase()]||0;
    const av=ATTACKER_ORDER[b[move.from.row][move.from.col].toUpperCase()]||5;
    return 2000+vv*10-av;
  }
  return 0;
}

function killerScore(move,d){
  if(d>=0&&d<24&&killers[d]){
    const k=killers[d];
    for(const km of k){
      if(km&&km.from.row===move.from.row&&km.from.col===move.from.col&&km.to.row===move.to.row&&km.to.col===move.to.col)return 1000;
    }
  }
  return 0;
}

function getAllMoves(b,color,d){
  const moves=[];
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){
    if(pc(b[r][c])!==color)continue;
    for(const to of legalMovesFor(b,r,c))moves.push({from:{row:r,col:c},to});
  }
  moves.sort((a,mv)=>(mvvLva(b,mv)+killerScore(mv,d))-(mvvLva(b,a)+killerScore(a,d)));
  return moves;
}

let tStart,tLimit;

function ab(b,depth,alpha,beta,isMax,color){
  if(Date.now()-tStart>tLimit)return{score:evaluate(b),timeout:true};
  const hash=zobrist(b,color);
  const tte=TT.get(hash);
  if(tte&&tte.depth>=depth){
    if(tte.flag===EXACT)return{score:tte.score};
    if(tte.flag===LOWER&&tte.score>alpha)alpha=tte.score;
    if(tte.flag===UPPER&&tte.score<beta)beta=tte.score;
    if(alpha>=beta)return{score:tte.score};
  }
  if(depth===0)return{score:evaluate(b)};

  const moves=getAllMoves(b,color,depth);
  if(!moves.length)return{score:isMax?-9500:9500};

  let best=isMax?-Infinity:Infinity,bestMove=null,timedOut=false;
  const origAlpha=alpha;

  for(const move of moves){
    const nb=applyMove(b,move.from,move.to);
    const res=ab(nb,depth-1,alpha,beta,!isMax,en(color));
    if(res.timeout){timedOut=true;break;}
    const val=res.score;
    if(isMax?val>best:val<best){best=val;bestMove=move;}
    if(isMax)alpha=Math.max(alpha,best);else beta=Math.min(beta,best);
    if(beta<=alpha){
      if(!b[move.to.row][move.to.col]&&depth<24){
        killers[depth][1]=killers[depth][0];killers[depth][0]=move;
      }
      break;
    }
    if(Math.abs(best)>9000)break;
  }

  if(!timedOut){
    const flag=best<=origAlpha?UPPER:best>=beta?LOWER:EXACT;
    TT.set(hash,{depth,score:best,flag});
  }
  return{score:best,move:bestMove,timeout:timedOut};
}

function iterDeep(b,color,maxD,limit){
  tStart=Date.now();tLimit=limit;
  TT.clear();
  killers.forEach(k=>{k[0]=null;k[1]=null;});
  const isMax=color===RED;
  let bestMove=null;
  for(let d=1;d<=maxD;d++){
    const moves=getAllMoves(b,color,d);
    if(!moves.length)break;
    let best=isMax?-Infinity:Infinity,dm=moves[0],timedOut=false;
    for(const move of moves){
      if(Date.now()-tStart>tLimit){timedOut=true;break;}
      const nb=applyMove(b,move.from,move.to);
      const res=ab(nb,d-1,-Infinity,Infinity,!isMax,en(color));
      if(res.timeout){timedOut=true;break;}
      if(isMax?res.score>best:res.score<best){best=res.score;dm=move;}
    }
    bestMove=dm;
    if(timedOut)break;
    if(Math.abs(best)>9000)break;
  }
  return bestMove;
}

onmessage=function(e){
  const{board,color,maxDepth,timeLimit}=e.data;
  const move=iterDeep(board,color,maxDepth,timeLimit);
  postMessage(move);
};
`;

const workerBlob = new Blob([WORKER_SRC], {type: 'application/javascript'});
const workerURL  = URL.createObjectURL(workerBlob);
let   aiWorker   = null;

function showAIThinking(visible) {
  document.getElementById('ai-thinking').classList.toggle('visible', visible);
}

function scheduleAIMove() {
  if (aiThinking) return;
  aiThinking = true;
  showAIThinking(true);
  const myToken = ++aiMoveToken;

  const aiColor = enemy(playerColor);

  if (aiEngine === 'pikafish') {
    // Use Pikafish API
    schedulePikafishMove(myToken, aiColor);
  } else {
    // Use local AI
    scheduleLocalAIMove(myToken, aiColor);
  }
}

function scheduleLocalAIMove(myToken, aiColor) {
  const depths   = [2, 3, 5];
  const times    = [1000, 2000, 4000];
  const maxDepth = depths[difficulty - 1] || 3;
  const timeLimit = times[difficulty - 1] || 2000;

  if (aiWorker) { aiWorker.terminate(); aiWorker = null; }
  aiWorker = new Worker(workerURL);

  aiWorker.onmessage = function(e) {
    aiWorker = null;
    if (myToken !== aiMoveToken) return;
    aiThinking = false;
    showAIThinking(false);
    const move = e.data;
    if (move) doMove(move.from, move.to);
  };
  aiWorker.onerror = function(err) {
    console.error('AI worker error:', err);
    aiWorker = null;
    aiThinking = false;
    showAIThinking(false);
  };

  aiWorker.postMessage({ board, color: aiColor, maxDepth, timeLimit });
}

async function schedulePikafishMove(myToken, aiColor) {
  try {
    const fen = boardToFEN(board, turn);
    const depths = [10, 15, 20];
    const times = [500, 1000, 2000];
    const depth = depths[difficulty - 1] || 15;
    const movetime = times[difficulty - 1] || 1000;

    const response = await fetch(`${PIKAFISH_API}/bestmove`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fen, depth, movetime })
    });

    if (myToken !== aiMoveToken) return;

    const data = await response.json();
    
    if (data.bestMove) {
      const move = parsePikafishMove(data.bestMove);
      if (move) {
        doMove(move.from, move.to);
      }
    }
  } catch (error) {
    console.error('Pikafish API error:', error);
    toast('Pikafish API 连接失败，切换到本地AI');
    // Fallback to local AI
    aiEngine = 'local';
    scheduleLocalAIMove(myToken, aiColor);
    return;
  }
  
  aiThinking = false;
  showAIThinking(false);
}

function parsePikafishMove(moveStr) {
  // Pikafish format: "b2e2" (from b2 to e2)
  // Convert to {from: {row, col}, to: {row, col}}
  const cols = 'abcdefghi';
  const fromCol = cols.indexOf(moveStr[0]);
  const fromRow = 9 - parseInt(moveStr[1]);
  const toCol = cols.indexOf(moveStr[2]);
  const toRow = 9 - parseInt(moveStr[3]);
  
  if (fromCol < 0 || toCol < 0) return null;
  
  return {
    from: { row: fromRow, col: fromCol },
    to: { row: toRow, col: toCol }
  };
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

function cellToXY(r, c) {
  return { x: PAD + c*CELL, y: PAD + r*CELL };
}

function xyToCell(x, y) {
  const c = Math.round((x - PAD) / CELL);
  const r = Math.round((y - PAD) / CELL);
  if (c<0||c>=9||r<0||r>=10) return null;
  const px = PAD + c*CELL, py = PAD + r*CELL;
  if (Math.abs(x-px) < CELL*0.5 && Math.abs(y-py) < CELL*0.5) return {row:r,col:c};
  return null;
}

function render() {
  ctx.clearRect(0,0,W,H);
  drawBoard();
  drawHighlights();
  drawPieces();
}

function drawBoard() {
  // Board background
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, '#d4a84b');
  grad.addColorStop(1, '#b8882e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Wood grain effect
  ctx.strokeStyle = 'rgba(0,0,0,0.05)';
  for (let i=0;i<W;i+=8) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
  }

  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth = 1.5;

  // Grid lines
  for (let r=0;r<10;r++) {
    const {x:x0,y} = cellToXY(r,0);
    const {x:x1}   = cellToXY(r,8);
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
  }
  for (let c=0;c<9;c++) {
    const {x,y:y0} = cellToXY(0,c);
    if (c===0||c===8) {
      const {y:y1} = cellToXY(9,c);
      ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y1); ctx.stroke();
    } else {
      // Split at river
      const {y:y4} = cellToXY(4,c);
      const {y:y5} = cellToXY(5,c);
      ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y5); ctx.lineTo(x,cellToXY(9,c).y); ctx.stroke();
    }
  }

  // Palace diagonals
  drawPalaceDiags(0,3,'black');
  drawPalaceDiags(7,3,'red');

  // River text
  ctx.font = 'bold 22px serif';
  ctx.fillStyle = '#7a5020';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const riverY = (cellToXY(4,0).y + cellToXY(5,0).y)/2;
  ctx.fillText('楚 河', PAD + CELL*1.8, riverY);
  ctx.fillText('漢 界', PAD + CELL*5.2, riverY);

  // Corner marks
  drawCrossMarks();
}

function drawPalaceDiags(startRow, startCol, side) {
  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth = 1.5;
  const p1 = cellToXY(startRow, startCol);
  const p2 = cellToXY(startRow+2, startCol+2);
  const p3 = cellToXY(startRow, startCol+2);
  const p4 = cellToXY(startRow+2, startCol);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.stroke();
}

function drawCrossMarks() {
  const marks = [
    // Black cannon start
    {r:2,c:1},{r:2,c:7},
    // Red cannon start
    {r:7,c:1},{r:7,c:7},
    // Pawn positions
    {r:3,c:0},{r:3,c:2},{r:3,c:4},{r:3,c:6},{r:3,c:8},
    {r:6,c:0},{r:6,c:2},{r:6,c:4},{r:6,c:6},{r:6,c:8},
  ];
  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth = 1.5;
  for (const {r,c} of marks) {
    const {x,y} = cellToXY(r,c);
    drawCross(x,y, r,c);
  }
}

function drawCross(x,y,r,c) {
  const s=6, g=4;
  const top    = r > 0;
  const bottom = r < 9;
  const left   = c > 0;
  const right  = c < 8;
  ctx.beginPath();
  if (top)    { ctx.moveTo(x-s,y-g); ctx.lineTo(x-s,y-s); ctx.lineTo(x-g,y-s); }
  if (top)    { ctx.moveTo(x+g,y-s); ctx.lineTo(x+s,y-s); ctx.lineTo(x+s,y-g); }
  if (bottom) { ctx.moveTo(x-s,y+g); ctx.lineTo(x-s,y+s); ctx.lineTo(x-g,y+s); }
  if (bottom) { ctx.moveTo(x+g,y+s); ctx.lineTo(x+s,y+s); ctx.lineTo(x+s,y+g); }
  ctx.stroke();
}

function drawHighlights() {
  // Last move highlight
  if (history.length > 0) {
    const last = history[history.length-1];
    if (last.from && last.to) {
      ctx.fillStyle = 'rgba(255,220,50,0.25)';
      for (const pos of [last.from, last.to]) {
        const {x,y} = cellToXY(pos.row, pos.col);
        ctx.beginPath();
        ctx.arc(x, y, CELL*0.44, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Selected piece
  if (selected) {
    const {x,y} = cellToXY(selected.row, selected.col);
    ctx.strokeStyle = '#fff200';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(x,y,CELL*0.44,0,Math.PI*2); ctx.stroke();
  }

  // Legal moves
  for (const m of legalMoves) {
    const {x,y} = cellToXY(m.row,m.col);
    if (board[m.row][m.col]) {
      // Capture move
      ctx.strokeStyle = 'rgba(255,80,80,0.85)';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(x,y,CELL*0.44,0,Math.PI*2); ctx.stroke();
    } else {
      // Empty move dot
      ctx.fillStyle = 'rgba(0,150,255,0.5)';
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawPieces() {
  for (let r=0;r<10;r++) {
    for (let c=0;c<9;c++) {
      const p = board[r][c];
      if (!p) continue;
      const {x,y} = cellToXY(r,c);
      drawPiece(x, y, p);
    }
  }
}

function drawPiece(x, y, p) {
  const color = pieceColor(p);
  const rad = CELL*0.42;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 5;
  ctx.shadowOffsetY = 2;

  // Outer ring
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2);
  const outerGrad = ctx.createRadialGradient(x-rad*0.2,y-rad*0.2,rad*0.1,x,y,rad);
  if (color===RED) {
    outerGrad.addColorStop(0,'#d4a843');
    outerGrad.addColorStop(1,'#8b6820');
  } else {
    outerGrad.addColorStop(0,'#666');
    outerGrad.addColorStop(1,'#222');
  }
  ctx.fillStyle = outerGrad;
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // Inner circle
  const innerRad = rad*0.86;
  ctx.beginPath(); ctx.arc(x,y,innerRad,0,Math.PI*2);
  const innerGrad = ctx.createRadialGradient(x-innerRad*0.3,y-innerRad*0.3,innerRad*0.1,x,y,innerRad);
  if (color===RED) {
    innerGrad.addColorStop(0,'#fff0d0');
    innerGrad.addColorStop(0.6,'#f5d070');
    innerGrad.addColorStop(1,'#c09030');
  } else {
    innerGrad.addColorStop(0,'#555');
    innerGrad.addColorStop(0.6,'#333');
    innerGrad.addColorStop(1,'#111');
  }
  ctx.fillStyle = innerGrad;
  ctx.fill();

  // Ring border
  ctx.beginPath(); ctx.arc(x,y,innerRad,0,Math.PI*2);
  ctx.strokeStyle = color===RED ? '#8b6820' : '#444';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Character
  const char = PIECE_CHARS[p] || p;
  ctx.font = `bold ${Math.round(rad*1.1)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color===RED ? '#8b0000' : '#ddd';
  ctx.fillText(char, x, y+1);
}

// ═══════════════════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════════════════
function updateUI() {
  const inChk = isInCheck(board, turn);
  const noMov = !hasLegalMoves(board, turn);
  const el = document.getElementById('status-text');
  el.className = turn === RED ? 'red' : 'black';

  if (noMov) {
    const winner = turn===RED ? '黑方' : '红方';
    el.textContent = `${winner}胜`;
    el.classList.add('check');
  } else if (inChk) {
    el.textContent = (turn===RED?'红方':'黑方') + '被将军！';
    el.classList.add('check');
  } else {
    el.textContent = (turn===RED?'红方':'黑方') + '走棋';
  }

  document.getElementById('btn-undo').disabled = history.length===0;
  document.getElementById('btn-redo').disabled = future.length===0;

  document.getElementById('captured-red').textContent =
    capturedRed.map(p=>PIECE_CHARS[p]).join(' ');
  document.getElementById('captured-black').textContent =
    capturedBlack.map(p=>PIECE_CHARS[p]).join(' ');

  document.getElementById('fen-output').textContent = boardToFEN(board, turn);
}

function addMoveToHistory(notation, color) {
  const ml = document.getElementById('move-list');
  const num = Math.ceil(history.length/2);
  if (color === RED) {
    const entry = document.createElement('div');
    entry.className = 'move-entry';
    entry.dataset.idx = history.length;
    entry.innerHTML = `<span class="move-num">${num}.</span><span class="move-red">${notation}</span><span class="move-black" id="move-black-${num}"></span>`;
    ml.appendChild(entry);
  } else {
    const span = document.getElementById(`move-black-${num}`);
    if (span) span.textContent = notation;
    else {
      // Black moved after redo state mismatch, just append
      const entry = document.createElement('div');
      entry.className = 'move-entry';
      entry.innerHTML = `<span class="move-num">${num}.</span><span class="move-red"></span><span class="move-black">${notation}</span>`;
      ml.appendChild(entry);
    }
  }
  ml.scrollTop = ml.scrollHeight;
}

function rebuildMoveList() {
  const ml = document.getElementById('move-list');
  ml.innerHTML = '';
  let n = 0;
  for (const h of history) {
    if (!h.notation) continue;
    // Determine color from state: color that moved = enemy of current turn stored
    const movedColor = enemy(h.turn);
    addMoveEntry(ml, h.notation, movedColor, ++n);
  }
}

function addMoveEntry(ml, notation, color, n) {
  // Simple flat list
  const entry = document.createElement('div');
  entry.style.display='flex'; entry.style.gap='8px';
  entry.innerHTML = `<span style="color:rgba(212,168,67,0.5);min-width:24px">${Math.ceil(n/2)}.</span><span class="${color===RED?'move-red':'move-black'}">${notation}</span>`;
  ml.appendChild(entry);
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
canvas.addEventListener('click', e=>{
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top)  * scaleY;
  const cell = xyToCell(x, y);
  if (cell) selectCell(cell.row, cell.col);
});

document.getElementById('btn-new').addEventListener('click', ()=>{
  if (history.length>0) {
    if (!confirm('开始新局？当前对局将丢失。')) return;
  }
  newGame();
  toast('新局已开始');
  if (gameMode === 'ai' && playerColor === BLACK) scheduleAIMove();
});
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.getElementById('btn-load-fen').addEventListener('click', ()=>{
  const val = document.getElementById('fen-input').value.trim();
  loadPosition(val);
});

document.getElementById('btn-copy-fen').addEventListener('click', ()=>{
  const fen = boardToFEN(board, turn);
  navigator.clipboard.writeText(fen).then(()=>toast('FEN 已复制'));
});

document.getElementById('btn-save').addEventListener('click', ()=>{
  const state = {board, turn, history, future, capturedRed, capturedBlack};
  localStorage.setItem('xiangqi_save', JSON.stringify(state));
  toast('存档成功');
});

document.getElementById('btn-load-save').addEventListener('click', ()=>{
  const raw = localStorage.getItem('xiangqi_save');
  if (!raw) { toast('无存档'); return; }
  try {
    const state = JSON.parse(raw);
    board = state.board; turn = state.turn;
    history = state.history||[]; future = state.future||[];
    capturedRed = state.capturedRed||[]; capturedBlack = state.capturedBlack||[];
    selected=null; legalMoves=[];
    rebuildMoveList(); render(); updateUI();
    toast('读档成功');
  } catch(e) { toast('读档失败'); }
});

document.getElementById('file-input').addEventListener('change', e=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadPosition(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
});

function loadPosition(text) {
  cancelAI();
  text = text.trim();
  try {
    // Try JSON
    const obj = JSON.parse(text);
    if (obj.board) {
      board = obj.board; turn = obj.turn||RED;
      history=[]; future=[];
      capturedRed=obj.capturedRed||[]; capturedBlack=obj.capturedBlack||[];
      selected=null; legalMoves=[];
      rebuildMoveList(); render(); updateUI();
      toast('局面加载成功');
      if (gameMode === 'ai' && turn !== playerColor) scheduleAIMove();
      return;
    }
    if (obj.fen) { text = obj.fen; } // fall through
  } catch(e) {}
  // Try FEN
  try {
    const parsed = parseFEN(text);
    board = parsed.board; turn = parsed.turn;
    history=[]; future=[]; capturedRed=[]; capturedBlack=[];
    selected=null; legalMoves=[];
    document.getElementById('move-list').innerHTML='';
    render(); updateUI();
    toast('FEN 加载成功');
    if (gameMode === 'ai' && turn !== playerColor) scheduleAIMove();
  } catch(e) { toast('格式错误：' + e.message); }
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), dur);
}

newGame();
